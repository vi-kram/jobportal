name: Job Portal CI/CD

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:

  build-user-service:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Docker Login
        run: echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
      - name: Build & Test user-service
        run: cd user-service && chmod +x mvnw && ./mvnw package -DskipTests -q
      - name: Build & Push Docker image
        run: |
          docker build --no-cache -t $DOCKER_USERNAME/user-service:latest ./user-service
          docker push $DOCKER_USERNAME/user-service:latest

