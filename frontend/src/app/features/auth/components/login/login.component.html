<!-- Login Page -->
<div class="min-h-screen flex flex-col items-center justify-center px-4" style="background:var(--bg)">

  <!-- Logo + Title -->
  <div class="flex flex-col items-center mb-8">
    <div class="w-14 h-14 rounded-2xl flex items-center justify-center mb-4 shadow-md avatar-gradient">
      <span class="text-white text-2xl font-bold">J</span>
    </div>
    <p class="section-label mb-3">Welcome Back</p>
    <h1 class="text-3xl font-bold" style="color:var(--text)">Sign in</h1>
    <p class="text-sm mt-2" style="color:var(--text-muted)">Stay updated on your professional world</p>
  </div>

  <!-- Card — same as job-detail cards -->
  <div class="rounded-xl w-full max-w-md p-6 mb-5" style="background:var(--surface); border:1px solid var(--border)">

    <!-- Info Banner — same as skill tags style -->
    <div class="rounded-lg p-3 mb-6 flex gap-2 text-sm" style="background:var(--bg); color:var(--accent); border:1px solid var(--border)">
      <span>ℹ️</span>
      <span>Your dashboard adapts automatically for Job Seeker, Recruiter, or Admin.</span>
    </div>

    <!-- Error -->
    <div *ngIf="error" class="rounded-lg p-3 mb-4 text-sm" style="background:var(--danger-dim); border:1px solid var(--danger); color:var(--danger)">
      {{ error }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-xs font-semibold uppercase tracking-widest mb-2" style="color:var(--text-muted)">Email or Phone</label>
        <div class="flex items-center rounded-lg px-3 py-2.5 gap-2" style="border:1px solid var(--border); background:var(--bg)">
          <span style="color:var(--accent)">✉️</span>
          <input formControlName="email" type="email" placeholder="you@example.com"
            class="text-sm outline-none w-full bg-transparent" style="color:var(--text)" />
        </div>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block text-xs font-semibold uppercase tracking-widest mb-2" style="color:var(--text-muted)">Password</label>
        <div class="relative flex items-center rounded-lg px-3 py-2.5 gap-2" style="border:1px solid var(--border); background:var(--bg)">
          <span style="color:var(--accent)">🔒</span>
          <input formControlName="password" [type]="showPassword ? 'text' : 'password'"
            placeholder="Your password"
            class="text-sm outline-none w-full bg-transparent pr-8" style="color:var(--text)" />
          <button type="button" (click)="togglePassword()" class="absolute right-3 text-sm" style="color:var(--text-muted)">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <!-- Remember me + Forgot -->
      <div class="flex items-center justify-between mb-5">
        <label class="flex items-center gap-2 text-sm cursor-pointer" style="color:var(--text)">
          <input type="checkbox" class="rounded" style="accent-color:var(--accent)" /> Remember me
        </label>
        <button type="button" (click)="showForgotMsg = !showForgotMsg"
          class="text-xs font-semibold hover:underline" style="color:var(--accent)">
          Forgot password?
        </button>
      </div>

      <div *ngIf="showForgotMsg" class="rounded-lg p-3 mb-4 text-sm" style="background:var(--bg); border:1px solid var(--border); color:var(--accent)">
        Please contact your administrator to reset your password.
      </div>

      <!-- Sign in button — same as Apply Now in job-detail -->
      <button type="submit" [disabled]="loading"
        class="w-full text-white font-semibold px-6 py-2.5 rounded-full transition disabled:opacity-50"
        style="background:var(--accent)">
        {{ loading ? 'Signing in...' : 'Sign in →' }}
      </button>

    </form>

    <!-- Divider -->
    <div class="flex items-center my-5">
      <div class="flex-1" style="border-top:1px solid var(--border)"></div>
      <span class="px-3 text-xs font-semibold uppercase tracking-widest" style="color:var(--text-muted)">or</span>
      <div class="flex-1" style="border-top:1px solid var(--border)"></div>
    </div>

    <!-- Social buttons — same as Save/Share buttons in job-detail -->
    <div class="flex gap-3">
      <button type="button" (click)="showSocialMsg = true"
        class="flex-1 flex items-center justify-center gap-2 px-4 py-2 rounded-full text-sm font-medium transition"
        style="border:1px solid var(--border); color:var(--accent)">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4" alt="Google" />
        Google
      </button>
      <button type="button" (click)="showSocialMsg = true"
        class="flex-1 flex items-center justify-center gap-2 px-4 py-2 rounded-full text-sm font-medium transition"
        style="border:1px solid var(--border); color:var(--accent)">
        🍎 Apple
      </button>
    </div>
    <div *ngIf="showSocialMsg" class="mt-3 text-center text-xs" style="color:var(--text-muted)">Social login coming soon</div>

  </div>

  <!-- Join link -->
  <p class="mt-2 text-sm" style="color:var(--text-muted)">
    New to the platform?
    <a routerLink="/register" class="font-semibold hover:underline" style="color:var(--accent)">Join now →</a>
  </p>

</div>
